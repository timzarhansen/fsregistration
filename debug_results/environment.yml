# Conda environment for MATLAB to Python conversion project
# 
# Usage:
#   conda env create -f environment.yml
#   conda activate matlab_to_python
#
# To update existing environment:
#   conda env update -f environment.yml

name: matlab_to_python
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version (3.10 recommended for best compatibility)
  - python=3.10
  
  # Core scientific computing
  - numpy>=1.21.0
  - scipy>=1.9.0
  - pandas>=1.4.0
  
  # Visualization
  - matplotlib>=3.6.0
  - plotly>=5.15.0
  - ipywidgets>=8.0.0
  - notebook>=6.4.0
  
  # Point cloud operations and 3D visualization
  - open3d>=0.16.0
  
  # Image processing
  - scikit-image>=0.20.0
  
  # Symbolic mathematics (for spherical harmonics, Legendre polynomials)
  - sympy>=1.11.0
  
  # YAML processing
  - pyyaml>=6.0
  
  # Additional utilities
  - pillow>=9.0.0
  
  # Optional packages (uncomment if needed):
  # - jupyter>=7.0.0          # For interactive development
  # - pytest>=7.0.0           # For testing
  # - opencv>=4.8.0           # For additional image processing
  # - tqdm>=4.65.0            # Progress bars for batch processing

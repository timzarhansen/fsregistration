# RegTR Conda Environment
# CPU-only version for testing on Predator dataset
# Usage: conda env create -f environment_regtr.yml
# NOTE: After creating environment, compile C++ wrappers:
#   1. cd predator/cpp_wrappers && bash compile_wrappers.sh
#   2. cd regtr/src/models/backbone_kpconv/cpp_wrappers && bash compile_wrappers.sh

name: regtr_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy<2
  - scipy
  - tqdm
  - matplotlib
  - pyyaml
  - h5py
  - scikit-learn
  - vtk>=9.0.3
  - pip
  - pip:
    - numpy<2
    - torch==2.0.0
    - torchvision==0.15.0
    - open3d
    - transforms3d
    - easydict
    - ipdb
    - einops
    - nibabel
    - h5py
    - tensorboard
    - GitPython
    - coloredlogs
